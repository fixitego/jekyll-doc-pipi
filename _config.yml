baseurl: '/jekyll-doc-pipi/'
permalink: pretty
title: 'Financial Consultant YenYen'

google_analytics_id: ""

homepage:
  show_call_box: true

logo:
  mobile: "images/logo/logo-mobile.svg"
  desktop: "images/logo/logo.png"
  desktop_height: "36px"

footer:
  copyright_text: 'For YenYenYenYen <a class="zerostatic" href="https://fixitego.github.io/jekyll-doc-pipi/">fixitego.github.io/jekyll-doc-pipi</a>'

seo:
  meta_og_title: "Financial Consultant YenYen"
  meta_og_type: "website"
  meta_og_url: "https://fixitego.github.io/jekyll-doc-pipi/"

collections:
  services:
    output: true
  team:
    output: true

sass:
  indentWidth: 4
  style: compact # possible values: nested expanded compact compressed
  precision: 10

plugins:
  - jekyll-environment-variables

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - LICENSE
  - README.md